<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — NoDRM</title>
    <meta name="description" content="Accede a tu cuenta NoDRM para gestionar tu biblioteca de videojuegos DRM-free. Compra, vende y juega sin restricciones.">
    <link rel="canonical" href="https://nodrm.netlify.app/login.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Iniciar Sesión — NoDRM">
    <meta property="og:description" content="Accede a tu cuenta NoDRM para gestionar tu biblioteca de videojuegos DRM-free.">
    <meta property="og:url" content="https://nodrm.netlify.app/login.html">
    <meta property="og:site_name" content="NoDRM">
    <meta property="og:image" content="https://nodrm.netlify.app/og-image.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Iniciar Sesión — NoDRM">
    <link rel="preconnect" href="https://akljuohhadsnryikgufc.supabase.co">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">NoDRM</a>
            <nav>
                <ul>
                    <li><a href="index.html">Novedades</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="campeonatos.html">Campeonatos</a></li>
                    <li><a href="subir-juego.html">Subir Juego</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <span class="auth-logo">🔓</span>
                    <h1 class="auth-title">Iniciar Sesión</h1>
                    <p class="auth-subtitle">Accede a tu biblioteca DRM-free</p>
                </div>
                
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--gray-medium); font-size: 0.85rem; cursor: pointer;">
                            <input type="checkbox" id="remember" style="accent-color: var(--neon-green);">
                            Recordarme
                        </label>
                        <a href="olvido-contrasena.html" style="color: var(--neon-cyan); font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">
                        Entrar
                    </button>
                    
                    <div class="auth-footer">
                        <p>No tienes cuenta? <a href="registro.html">Regístrate</a></p>
                    </div>

                    <div id="resendSection" style="display:none;margin-top:1rem;padding:1rem;border:1px solid var(--neon-yellow);border-radius:var(--radius);text-align:center;">
                        <p style="color:var(--neon-yellow);font-family:var(--font-mono);font-size:0.85rem;margin-bottom:0.8rem;">Email no confirmado</p>
                        <button onclick="resendConfirmation()" class="btn btn-secondary" id="resendBtn" style="font-size:0.85rem;padding:0.5rem 1.5rem;">Reenviar email de confirmación</button>
                        <p id="resendMsg" style="color:var(--gray-medium);font-size:0.8rem;margin-top:0.5rem;display:none;"></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>NoDRM © 2026 — Tus juegos, tu libertad. · <a href="pagina-politicas.html" style="color:var(--neon-cyan);text-decoration:none;">Términos y Políticas</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        if (localStorage.getItem('nodrm_currentUser')) window.location.href = 'index.html';

        let pendingEmail = '';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.textContent = 'Entrando...';
            btn.disabled = true;
            document.getElementById('resendSection').style.display = 'none';

            const { data, error } = await SupabaseApp.Auth.signIn(email, password);

            if (error) {
                if (error.message && error.message.toLowerCase().includes('email not confirmed')) {
                    pendingEmail = email;
                    document.getElementById('resendSection').style.display = 'block';
                    document.getElementById('resendMsg').style.display = 'none';
                } else {
                    alert(error.message || 'Email o contraseña incorrectos');
                }
                btn.textContent = 'Entrar';
                btn.disabled = false;
                return;
            }

            const { user } = await SupabaseApp.Auth.getUser();
            if (user) {
                const { data: profile } = await SupabaseApp.Profiles.get(user.id);
                const userData = {
                    id: user.id,
                    email: user.email,
                    username: profile?.username || user.email.split('@')[0],
                    displayName: profile?.display_name || user.email.split('@')[0],
                    avatar: profile?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (profile?.username || user.email),
                    createdAt: profile?.created_at || user.created_at
                };
                localStorage.setItem('nodrm_currentUser', JSON.stringify(userData));
            }

            btn.textContent = '✓ OK';
            setTimeout(() => window.location.href = 'index.html', 800);
        });

        async function resendConfirmation() {
            if (!pendingEmail) return;
            const btn = document.getElementById('resendBtn');
            const msg = document.getElementById('resendMsg');
            btn.textContent = 'Reenviando...';
            btn.disabled = true;
            const { error } = await SupabaseApp.Auth.resendConfirmation(pendingEmail);
            if (error) {
                msg.textContent = 'Error: ' + (error.message || 'Intenta de nuevo');
                msg.style.color = 'var(--neon-pink)';
            } else {
                msg.textContent = 'Email reenviado. Revisa tu bandeja de entrada.';
                msg.style.color = 'var(--neon-green)';
            }
            msg.style.display = 'block';
            btn.textContent = 'Reenviar email de confirmación';
            btn.disabled = false;
        }
    </script>
</body>
</html>
