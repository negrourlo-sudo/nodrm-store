    <style>
        .catalog-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .results-info {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--gray-medium);
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            background: var(--gray);
            border: 1px solid var(--gray-light);
            border-radius: var(--radius-sm);
            color: var(--white);
            width: 250px;
            transition: all 0.2s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.2);
        }
        
        .search-box::before {
            content: '⌕';
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-medium);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .cart-icon {
            position: relative;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--neon-pink);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }
    </style>
</head>

                </div>
                <a href="carrito.html" class="cart-icon" style="text-decoration:none;">
                    🛒
                    <span class="cart-badge" id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <h1 class="page-title">Catálogo</h1>
        
        <div class="catalog-controls">
            <div class="filters" id="filters"></div>
            <div class="results-info">
                <span id="games-count">0 juegos</span>
            </div>
        </div>
        
        <div class="games-grid" id="catalogo-grid"></div>
    </main>
