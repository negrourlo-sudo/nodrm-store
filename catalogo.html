<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoDRM - Catálogo</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .catalog-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .results-info {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--gray-medium);
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            background: var(--gray);
            border: 1px solid var(--gray-light);
            border-radius: var(--radius-sm);
            color: var(--white);
            width: 250px;
            transition: all 0.2s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.2);
        }
        
        .search-box::before {
            content: '⌕';
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-medium);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .cart-icon {
            position: relative;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--neon-pink);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }
    </style>
</head>
<body data-page="catalogo">
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">NoDRM</a>
            <nav>
                <ul>
                    <li><a href="index.html">Novedades</a></li>
                    <li><a href="catalogo.html" class="active">Catálogo</a></li>
                    <li><a href="campeonatos.html">Campeonatos</a></li>
                    <li><a href="concursos.html">Concursos</a></li>
                    <li><a href="perfil.html">Perfil</a></li>
                    <li><a href="configuracion.html">Config</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Buscar juegos...">
                </div>
                <div class="cart-icon">
                    🛒
                    <span class="cart-badge" id="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <h1 class="page-title">Catálogo</h1>
        
        <div class="catalog-controls">
            <div class="filters" id="filters"></div>
            <div class="results-info">
                <span id="games-count">0 juegos</span>
            </div>
        </div>
        
        <div class="games-grid" id="catalogo-grid"></div>
    </main>

    <footer>
        <p>NoDRM © 2026 — Tus juegos, tu libertad.</p>
    </footer>

    <script src="data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
