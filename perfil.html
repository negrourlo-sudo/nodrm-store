<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoDRM - Mi Perfil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="perfil">
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">NoDRM</a>
            <nav>
                <ul>
                    <li><a href="index.html">Novedades</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="campeonatos.html">Campeonatos</a></li>
                    <li><a href="subir-juego.html">Subir Juego</a></li>
                    <li><a href="perfil.html" class="active">Perfil</a></li>
                    <li><a href="configuracion.html">Config</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1 class="page-title">Mi Perfil</h1>

        <div class="profile-section">
            <div class="profile-header" id="profile-header"></div>
            <div class="stats" id="user-stats"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Biblioteca</h3>
            <div class="games-grid" id="owned-games"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Lista de Deseos</h3>
            <div class="games-grid" id="wishlist-games"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Mis Juegos Publicados</h3>
            <div id="my-games"></div>
            <a href="subir-juego.html" class="btn btn-primary" style="display:inline-block;margin-top:1rem;">+ Subir Nuevo Juego</a>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Historial</h3>
            <div id="purchase-history"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Logros</h3>
            <div id="achievements"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Leaderboard Global</h3>
            <div id="global-leaderboard" class="leaderboard-container"></div>
        </div>

        <div class="profile-section">
            <h3 class="section-title">Amigos</h3>
            <div class="friends-list" id="friends-list"></div>
        </div>
    </main>

    <footer>
        <p>NoDRM © 2026 — Tus juegos, tu libertad. · <a href="pagina-politicas.html" style="color:var(--neon-cyan);text-decoration:none;">Términos y Políticas</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = AuthManager.getCurrentUser();
            const friendsList = document.getElementById('friends-list');
            if (!friendsList || !user) return;

            const { data: friends } = await SupabaseApp.Friends.getFriends(user.id);
            if (!friends || friends.length === 0) {
                friendsList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No tienes amigos aún.</p>';
                return;
            }

            friendsList.innerHTML = friends.map(f => {
                const p = f.profiles;
                const name = p?.display_name || p?.username || 'Amigo';
                const username = p?.username || '';
                const avatar = p?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username;
                return `
                    <div class="friend-item">
                        <div class="friend-avatar">
                            <img src="${avatar}" alt="${name}">
                        </div>
                        <div class="friend-info">
                            <h4>${name}</h4>
                            <p class="friend-username">@${username}</p>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
